<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer-Enrollment - Urlabari</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --admin-blue: #1a237e; --sidebar-bg: #fdfdfd; --preview-bg: #2c3e50; --border-color: #222; }
        body { background-color: var(--preview-bg); margin: 0; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 380px; background: var(--sidebar-bg); padding: 25px; overflow-y: auto; z-index: 10; border-right: 1px solid #ccc; }
        .sidebar h2 { color: var(--admin-blue); font-size: 20px; border-bottom: 3px solid var(--admin-blue); padding-bottom: 8px; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: #555; }
        .input-group input, .input-group select { width: 100%; padding: 8px; border: 1.5px solid #ddd; border-radius: 6px; }
        
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: 800; color: white; font-size: 11px; text-transform: uppercase; }
        .btn-save { background: #fb8c00; grid-column: span 2; }
        .btn-list { background: #00897b; grid-column: span 2; }
        .btn-pdf { background: #b71c1c; }
        .btn-jpg { background: #1b5e20; }
        .btn-reset { background: #455a64; grid-column: span 2; }

        .preview-area { flex: 1; display: flex; justify-content: center; overflow-y: auto; padding: 20px; }
        #a4-page { width: 210mm; height: 297mm; background: white; padding: 12mm; box-sizing: border-box; position: relative; font-family: 'Times New Roman', serif; }
        .page-border { border: 2px solid var(--border-color); height: 100%; padding: 10mm; box-sizing: border-box; }
        
        /* Modal for List */
        #listModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; padding:40px; box-sizing:border-box; }
        .modal-content { background:white; width:100%; height:100%; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; }
        .modal-header { padding:20px; background:var(--admin-blue); color:white; display:flex; justify-content:space-between; }
        .modal-body { flex:1; overflow-y:auto; padding:20px; }
        table { width:100%; border-collapse:collapse; }
        th, td { border:1px solid #ddd; padding:10px; text-align:left; font-size:13px; }
        th { background:#f4f4f4; }
        .list-img { width:50px; height:60px; object-fit:cover; border:1px solid #ccc; }

        /* A4 Internal Styles */
        .header { text-align: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 20px; }
        .info-photo-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .photo-box { width: 35mm; height: 42mm; border: 1.5px solid var(--border-color); display: flex; align-items: center; justify-content: center; overflow:hidden; }
        .photo-box img { width:100%; height:100%; object-fit:cover; }
        .section-label { background: var(--admin-blue); color: white; padding: 4px 12px; font-size: 12px; font-weight: bold; margin-top: 15px; display: inline-block; }
        .field-row { display: flex; margin-bottom: 10px; align-items: flex-end; }
        .field-label { font-size: 14px; font-weight: bold; width: 150px; }
        .field-value { flex: 1; border-bottom: 1px solid #666; font-size: 15px; font-weight: 900; height: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Entry Console</h2>
        <div class="input-group"><label>Upload Photo</label><input type="file" id="photoInput" onchange="loadImg(event)"></div>
        <div class="input-group"><label>Form No</label><input type="text" oninput="up('v-fno', this.value)"></div>
        <div class="input-group"><label>Date</label><input type="date" id="input-date" onchange="up('v-date', this.value)"></div>
        <div class="input-group"><label>Full Name</label><input type="text" oninput="up('v-name', this.value)"></div>
        <div class="input-group"><label>Level</label><select id="lvl" onchange="up('v-lvl', this.value); filterYear()"><option value="">Select</option><option>XI</option><option>XII</option><option>Bachelor</option><option>Master</option></select></div>
        <div class="input-group"><label>Year/Sem</label><select id="yearSelect" onchange="up('v-yr', this.value)"><option value="">Select</option><option class="opt-bach">1st Year</option><option class="opt-bach">2nd Year</option><option class="opt-mast">1st Semester</option></select></div>
        <!-- Simplified for brevity, add other fields as needed -->
        
        <div class="action-btns">
            <button class="btn btn-save" onclick="saveData()">Save to Database</button>
            <button class="btn btn-list" onclick="fetchList()">View Saved List</button>
            <button class="btn btn-pdf" onclick="exportA4('pdf')">PDF</button>
            <button class="btn btn-jpg" onclick="exportA4('jpg')">JPG</button>
            <button class="btn btn-reset" onclick="window.location.reload()">Clear</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="a4-page">
            <div class="page-border">
                <div class="header"><h1>URLABARI MULTIPLE CAMPUS</h1><p>Computer Course-2083</p></div>
                <div class="info-photo-row">
                    <div style="font-size:13px">
                        <div><b>Form No:</b> <span id="v-fno">_________</span></div>
                        <div><b>Date:</b> <span id="v-date">..........</span></div>
                    </div>
                    <div class="photo-box" id="v-frame">Photo</div>
                </div>
                <div class="section-label">Identity</div>
                <div class="field-row"><div class="field-label">Full Name:</div><div class="field-value" id="v-name">..........</div></div>
                <div class="field-row"><div class="field-label">Level:</div><div class="field-value" id="v-lvl">..........</div></div>
                <div class="field-row"><div class="field-label">Year/Sem:</div><div class="field-value" id="v-yr">..........</div></div>
            </div>
        </div>
    </div>

    <!-- Data List Modal -->
    <div id="listModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Saved Enrollments</h3>
                <button onclick="document.getElementById('listModal').style.display='none'" style="color:white; background:red; border:none; cursor:pointer;">CLOSE</button>
            </div>
            <div class="modal-body">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Photo</th><th>Form No</th><th>Name</th><th>Level</th><th>Year/Sem</th><th>Date</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let currentPhotoBase64 = "";

        function up(id, val) { document.getElementById(id).innerText = val || ".........."; }

        function filterYear() {
            const lvl = document.getElementById('lvl').value;
            document.querySelectorAll('.opt-bach').forEach(o => o.style.display = (lvl === "Bachelor") ? "block" : "none");
            document.querySelectorAll('.opt-mast').forEach(o => o.style.display = (lvl === "Master") ? "block" : "none");
        }

        function loadImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                currentPhotoBase64 = reader.result;
                document.getElementById('v-frame').innerHTML = `<img src="${reader.result}">`;
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            const data = {
                fno: document.getElementById('v-fno').innerText,
                date: document.getElementById('input-date').value,
                name: document.getElementById('v-name').innerText,
                lvl: document.getElementById('v-lvl').innerText,
                yr: document.getElementById('v-yr').innerText,
                photo: currentPhotoBase64, // Saves image as text
                gender: "", padd: "", tadd: "", email: "", phone: "", fac: "" // Add remaining mapping
            };

            fetch('save.php', {
                method: 'POST',
                body: JSON.stringify(data)
            }).then(r => r.json()).then(res => {
                if(res.status === "success") alert("Saved!");
                else alert("Error: " + res.message);
            });
        }

        function fetchList() {
            document.getElementById('listModal').style.display = 'block';
            fetch('save.php')
            .then(r => r.json())
            .then(data => {
                const tbody = document.querySelector('#dataTable tbody');
                tbody.innerHTML = data.map(row => `
                    <tr>
                        <td><img src="${row.photo || ''}" class="list-img"></td>
                        <td>${row.form_no}</td>
                        <td>${row.full_name}</td>
                        <td>${row.level}</td>
                        <td>${row.year_sem}</td>
                        <td>${row.enroll_date}</td>
                    </tr>
                `).join('');
            });
        }

        function exportA4(type) {
            const element = document.getElementById('a4-page');
            const opt = { margin:0, filename:'Enrollment.pdf', image:{type:'jpeg', quality:1}, html2canvas:{scale:3}, jsPDF:{format:'a4'} };
            if(type === 'pdf') html2pdf().set(opt).from(element).save();
            else html2pdf().set(opt).from(element).outputImg().then(img => {
                const a = document.createElement('a'); a.href = img.src; a.download = 'Enrollment.jpg'; a.click();
            });
        }
    </script>
</body>
</html>
